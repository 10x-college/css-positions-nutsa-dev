<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positions</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Kumbh+Sans:wght,YOPQ@100..900,300&display=swap" rel="stylesheet">
</head>
<body>

    <div class="circle-left"></div>
    <div class="circle-right"></div>

    <section>
        <div class="card">

            <div class="card-pattern">
                <img src="assets/Container.png" alt="Pattern">
            </div>

            <img class="portrait" src="assets/Oval.png" alt="Portrait of Victor Crest" title="Victor Crest">

            <p class="name-and-age">Victor Crest <span>26</span></p>

            <p class="city">London</p>
                
            <hr>

            <div class="details">
                
                <div class="item followers">
                    <div class="amount">80K</div>
                    <div class="property">Followers</div>
                </div>

                <div class="item likes">
                    <div class="amount">803K</div>
                    <div class="property">Likes</div>
                </div>

                <div class="item photos">
                    <div class="amount">1.4K</div>
                    <div class="property">Photos</div>
                </div>
            

            </div>

        </div>
    </section>



    
</body>
</html>
